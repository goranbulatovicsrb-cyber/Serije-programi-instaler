name: Build SeriesIndexer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (Qt5 + MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt5_DIR }}"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Deploy Qt DLLs
        run: |
          cd build/Release
          windeployqt.exe --release --no-translations --no-system-d3d-compiler --no-opengl-sw SeriesIndexer.exe
        shell: pwsh

      - name: Copy seed database
        run: Copy-Item "series_seed.db" "build/Release/series_seed.db"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build Installer
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\SeriesIndexer.iss" /O"dist" /F"SeriesIndexer_v2.0_Setup"
        shell: pwsh

      - name: Create Portable ZIP
        run: |
          cd build
          Compress-Archive -Path "Release\*" -DestinationPath "SeriesIndexer_v2.0_Portable.zip"
        shell: pwsh

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: SeriesIndexer-Windows-Installer
          path: dist/SeriesIndexer_v2.0_Setup.exe
          retention-days: 30

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: SeriesIndexer-Windows-Portable
          path: build/SeriesIndexer_v2.0_Portable.zip
          retention-days: 30

  build-linux:
    name: Linux (Qt5 + GCC)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake qtbase5-dev libqt5sql5-sqlite libqt5network5 python3-openpyxl python3-pandas

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p dist
          cp build/SeriesIndexer dist/SeriesIndexer_Linux_x64
          cp series_seed.db dist/
          cp README.md dist/
          cd dist && tar -czf ../SeriesIndexer_Linux_x64.tar.gz .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: SeriesIndexer-Linux-x64
          path: SeriesIndexer_Linux_x64.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SeriesIndexer ${{ github.ref_name }}"
          body: |
            ## 🎬 SeriesIndexer ${{ github.ref_name }}

            ### 📥 Preuzimanje

            | Fajl | Opis |
            |------|------|
            | `SeriesIndexer_v2.0_Setup.exe` | **Windows Installer** — preporučeno |
            | `SeriesIndexer_v2.0_Portable.zip` | Windows Portable — bez instalacije |
            | `SeriesIndexer_Linux_x64.tar.gz` | Linux 64-bit |

            ### 🔑 Serijski broj
            Na prvom pokretanju potrebno je unijeti serijski broj.

            ### ⭐ IMDB
            Besplatan API ključ: https://www.omdbapi.com/apikey.aspx
          files: |
            artifacts/SeriesIndexer_v2.0_Setup.exe
            artifacts/SeriesIndexer_v2.0_Portable.zip
            artifacts/SeriesIndexer_Linux_x64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
